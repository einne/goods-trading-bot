name: Deploy To EC2

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  ci:
    name: CI Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app/*.py app/services/*.py scripts/*.py

  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Check required secrets
        id: precheck
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_KEY: ${{ secrets.EC2_KEY }}
        run: |
          set -e
          missing=0
          for v in EC2_HOST EC2_USER EC2_KEY; do
            if [ -z "${!v}" ]; then
              echo "::warning::Missing secret: ${v}"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "EC2 deploy skipped because required secrets are not set."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup SSH
        if: steps.precheck.outputs.skip == 'false'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_KEY }}

      - name: Deploy application
        if: steps.precheck.outputs.skip == 'false'
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          APP_DIR: /home/ec2-user/goods-trading-bot
        run: |
          ssh -o StrictHostKeyChecking=no "${EC2_USER}@${EC2_HOST}" << 'EOF'
            set -euo pipefail
            cd /home/ec2-user/goods-trading-bot
            git pull --ff-only origin main
            source venv/bin/activate
            pip install -r requirements.txt
            python scripts/seed_data.py
            sudo systemctl restart smartsupport-bot
            sudo systemctl is-active smartsupport-bot
          EOF
